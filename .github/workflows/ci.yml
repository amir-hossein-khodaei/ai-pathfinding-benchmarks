name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # --- JAVA ENGINE CHECKS ---
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # Prepared for future migration

      - name: Create Build Directory
        run: mkdir -p bin

      - name: Compile Java Sources
        run: |
          # Find all java files and compile them into bin/
          find src -name "*.java" > sources.txt
          javac -d bin @sources.txt
          echo "✅ Compilation Successful"

      # --- PYTHON ML PIPELINE CHECKS ---
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install ML Dependencies
        run: |
          pip install scikit-learn pandas numpy
          echo "✅ Python Dependencies Installed"

      - name: Verify ML Script Syntax
        run: |
          # Compiles python code to check for syntax errors without running it
          python -m py_compile ML.py
          echo "✅ ML.py Syntax Valid"
